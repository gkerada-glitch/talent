kind = "web"
previewPath = "/"
title = "Talent-DZ"
version = "1.0.0"
id = "artifacts/talent-dz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18417

[services.development]
run = "pnpm --filter @workspace/talent-dz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talent-dz", "run", "build" ]
publicDir = "artifacts/talent-dz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18417"
BASE_PATH = "/"
